name: Android Release Build & Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  quality_gate:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: 'stable'
          cache: true

      - name: Create environment files
        run: |-
          for ENV_FILE in ".env.dev" ".env.staging" ".env.prod"; do
          echo -e "API_BASE_URL=${{ secrets.API_BASE_URL }}\nSUPABASE_URL=${{ secrets.SUPABASE_URL }}\nSUPABASE_PUBLISHABLE_KEY=${{ secrets.SUPABASE_PUBLISHABLE_KEY }}\nGOOGLE_PLACES_API_KEY=${{ secrets.GOOGLE_PLACES_API_KEY }}" > $ENV_FILE
          done

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Lint (analyze)
        # Error-only gate (see ci.yml): legacy info/warning lint debt is logged
        # but non-blocking; only analyzer errors fail the release build.
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests
        run: flutter test --flavor dev

  build_and_publish_android:
    name: Build & Publish Android (prod)
    needs: quality_gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: 'stable'
          cache: true

      - name: Create environment files
        run: |-
          for ENV_FILE in ".env.dev" ".env.staging" ".env.prod"; do
          echo -e "API_BASE_URL=${{ secrets.API_BASE_URL }}\nSUPABASE_URL=${{ secrets.SUPABASE_URL }}\nSUPABASE_PUBLISHABLE_KEY=${{ secrets.SUPABASE_PUBLISHABLE_KEY }}\nGOOGLE_PLACES_API_KEY=${{ secrets.GOOGLE_PLACES_API_KEY }}" > $ENV_FILE
          done

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/keystore.jks

      - name: Create key.properties
        run: >-
          echo -e "storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}\nkeyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}\nkeyAlias=${{ secrets.ANDROID_KEY_ALIAS }}\nstoreFile=keystore.jks" > android/key.properties

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (prod)
        run: flutter build apk --release --flavor prod -t lib/main_prod.dart

      - name: Build AAB (prod)
        run: flutter build appbundle --release --flavor prod -t lib/main_prod.dart

      - name: Rename APK
        run: |
          set -euxo pipefail
          src="build/app/outputs/flutter-apk/app-prod-release.apk"
          dest="build/app/outputs/flutter-apk/360ghar-stays-prod.apk"
          if [ -f "$src" ]; then
            mv "$src" "$dest"
          else
            echo "APK not found at $src" >&2
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: stays-app-release-apk
          path: build/app/outputs/flutter-apk/360ghar-stays-prod.apk
          if-no-files-found: error

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: stays-app-release-aab
          path: build/app/outputs/bundle/prodRelease/app-prod-release.aab
          if-no-files-found: error

      - name: Publish to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: com.the360ghar.stays_app
          releaseFiles: build/app/outputs/bundle/prodRelease/app-prod-release.aab
          track: production
          status: completed
