name: Android Main Build

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build_android_main:
    name: Build Android APK (main, prod)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: 'stable'
          cache: true

      - name: Create environment files
        run: |-
          for ENV_FILE in ".env.dev" ".env.staging" ".env.prod"; do
          echo -e "API_BASE_URL=${{ secrets.API_BASE_URL }}\nSUPABASE_URL=${{ secrets.SUPABASE_URL }}\nSUPABASE_PUBLISHABLE_KEY=${{ secrets.SUPABASE_PUBLISHABLE_KEY }}\nGOOGLE_PLACES_API_KEY=${{ secrets.GOOGLE_PLACES_API_KEY }}" > $ENV_FILE
          done

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/keystore.jks

      - name: Create key.properties
        run: >-
          echo -e "storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}\nkeyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}\nkeyAlias=${{ secrets.ANDROID_KEY_ALIAS }}\nstoreFile=keystore.jks" > android/key.properties

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (json_serializable & mocks)
        # *.g.dart are gitignored; generate before building or the app fails to
        # compile on missing part files.
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK (prod)
        run: flutter build apk --release --flavor prod -t lib/main_prod.dart

      - name: Rename APK
        run: |
          set -euxo pipefail
          src="build/app/outputs/flutter-apk/app-prod-release.apk"
          dest="build/app/outputs/flutter-apk/360ghar-stays-prod.apk"
          if [ -f "$src" ]; then
            mv "$src" "$dest"
          else
            echo "APK not found at $src" >&2
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: stays-app-main-apk-${{ github.sha }}
          path: build/app/outputs/flutter-apk/360ghar-stays-prod.apk
          retention-days: 14
          if-no-files-found: error
