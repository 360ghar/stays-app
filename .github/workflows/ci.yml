name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  analyze_and_test:
    name: Lint, Format & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: 'stable'
          cache: true

      - name: Create environment files
        run: |-
          for ENV_FILE in ".env.dev" ".env.staging" ".env.prod"; do
          echo -e "API_BASE_URL=${{ secrets.API_BASE_URL }}\nSUPABASE_URL=${{ secrets.SUPABASE_URL }}\nSUPABASE_PUBLISHABLE_KEY=${{ secrets.SUPABASE_PUBLISHABLE_KEY }}\nGOOGLE_PLACES_API_KEY=${{ secrets.GOOGLE_PLACES_API_KEY }}" > $ENV_FILE
          done

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (json_serializable & mocks)
        # *.g.dart and *.mocks.dart are gitignored, so a fresh checkout ships
        # none of them. Generate before analyze/test or the build fails on
        # missing part files and undefined _<$Foo>{From,To}Json methods.
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Lint (analyze)
        # Error-only gate: the codebase carries ~590 pre-existing info/warning
        # lints (legacy debt) which are logged but non-fatal; only analyzer
        # errors fail CI. Re-enable --fatal-infos after a lint-cleanup PR.
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests
        # Plain 'flutter test' runs the Dart unit/widget suite in test/; no
        # --flavor (that is a build/integration flag, unnecessary for unit
        # tests and it triggers Gradle flavor resolution on headless runners).
        run: flutter test --coverage

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info
          flags: unittests
          fail_ci_if_error: false
